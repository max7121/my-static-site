<!doctype html> <!-- 使用標準 HTML5 文件型別，讓瀏覽器以一致模式呈現本頁。 -->
<html lang="zh-Hant"> <!-- 宣告繁體中文內容，協助瀏覽器與輔助工具辨識語言。 -->
  <head> <!-- 放置頁面設定與樣式，避免與可見內容混在一起。 -->
    <meta charset="utf-8"> <!-- 使用 UTF-8 編碼，確保中文文字不會亂碼。 -->
    <meta name="viewport" content="width=device-width, initial-scale=1"> <!-- 讓手機依螢幕寬度正確縮放版面。 -->
    <title>網站已上線</title> <!-- 設定瀏覽器分頁與搜尋結果可見的頁面名稱。 -->
    <style> /* 將起始頁所需樣式集中在檔案內，方便 GitHub Pages 直接發布。 */
      :root { color-scheme: light; } /* 指定明亮色系，避免系統深色模式意外改變文字可讀性。 */
      * { box-sizing: border-box; } /* 讓寬高計算包含內距，降低響應式排版的溢位風險。 */
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #172033; } /* 讓主要內容在各種螢幕中置中並維持易讀的系統字型與對比。 */
      main { width: min(92vw, 42rem); padding: 3rem; border: 1px solid #dfe6f2; border-radius: 1.25rem; background: #ffffff; box-shadow: 0 1rem 3rem rgb(23 32 51 / 10%); text-align: center; } /* 建立有限寬度的資訊卡片，讓起始訊息在桌機與手機皆清楚聚焦。 */
      h1 { margin: 0; font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: -0.04em; } /* 使用彈性字級，兼顧小螢幕與大螢幕的標題閱讀性。 */
      p { margin: 1rem 0 0; font-size: 1.125rem; line-height: 1.7; color: #526176; } /* 以舒適行高呈現說明，讓後續替換正式文案更容易。 */
    </style> <!-- 結束本頁內嵌樣式，避免額外建置流程。 -->
  </head> <!-- 結束頁面設定區。 -->
  <body> <!-- 開始使用者實際看到的內容。 -->
    <main> <!-- 以語意化主內容區包住起始頁訊息。 -->
      <h1>網站已上線</h1> <!-- 顯示網站已成功發布的主要狀態。 -->
      <p>這個 GitHub Pages 網站已準備完成，正式內容即將在這裡登場。</p> <!-- 提供可立即替換的暫用說明文字。 -->
    </main> <!-- 結束主要內容區。 -->
  </body> <!-- 結束可見內容。 -->
</html> <!-- 結束 HTML 文件。 -->
